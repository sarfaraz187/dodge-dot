<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="src/shapes.js" defer></script>
    <script src="src/utils.js" defer></script>
    <script src="src/main.js" defer></script>
    <title>Dodge Dot</title>
  </head>
  <body>
    <main>
      <div class="flex">
        <section class="coordinate-container">
          <h3>Mouse Coordinates</h3>
          <div>
            <canvas id="myCanvas" class="mouse-pointer-canvas" width="200" height="100" aria-label="Mouse movement graph"></canvas>
          </div>
          <div class="flex">
            <div class="flex mr-10">
              <div class="">X :&nbsp;</div>
              <span id="XCoordinateVal"></span>
            </div>
            <div class="flex">
              <div>Y :&nbsp;</div>
              <span id="YCoordinateVal"></span>
            </div>
          </div>
          <div class="flex mt-10">
            Score :&nbsp;
            <span id="scoreVal"></span>
          </div>
        </section>
      </div>

      <div>
        <div id="dot" class="dot"></div>
      </div>

      <div id="shapesContainer"></div>
    </main>
  </body>
</html>
