<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="src/shapes.js" defer></script>
    <script src="src/utils.js" defer></script>
    <script src="src/main.js" defer></script>
    <title>Dodge Dot</title>
  </head>
  <body>
    <main>
      <section class="flex">
        <div class="coordinate-container">
          <h3>Mouse Coordinates</h3>
          <canvas id="myCanvas" width="200" height="100" style="border:1px solid #000000;">

          <div class="flex">
            <div class="flex mr-10">
              <div class="">X coordinate :</div>
              <div id="XCoordinateVal"></div>
            </div>
            <div class="flex">
              <div>Y coordinate :</div>
              <div id="YCoordinateVal"></div>
            </div>
          </div>
          <div class="flex mt-10">
            Score :
            <div id="scoreVal"></div>
          </div>
        </div>
      </section>

      <div>
        <div id="dot" class="dot"></div>
      </div>

      <section id="shapesContainer"></section>
    </main>
  </body>
</html>
